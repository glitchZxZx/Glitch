<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Glitch</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Söhne", "ui-sans-serif", system-ui, -apple-system, sans-serif;
    background: #212121;
    color: #ececec;
    height: 100dvh;
    display: flex;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    background: #171717;
    display: flex;
    flex-direction: column;
    padding: 8px;
    flex-shrink: 0;
  }

  .sidebar-top {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    margin-bottom: 4px;
  }

  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: #7F77DD;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    flex-shrink: 0;
  }

  .sidebar-name {
    font-size: 15px;
    font-weight: 600;
    color: #ececec;
  }

  .new-chat-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    color: #ececec;
    font-size: 14px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    transition: background 0.15s;
  }
  .new-chat-btn:hover { background: #2a2a2a; }

  .new-chat-btn svg {
    width: 16px; height: 16px;
    stroke: #ececec;
    flex-shrink: 0;
  }

  .sidebar-section {
    font-size: 11px;
    color: #8e8ea0;
    padding: 12px 12px 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .history-item {
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 13px;
    color: #c5c5c5;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.15s;
  }
  .history-item:hover { background: #2a2a2a; }

  /* MAIN */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid #2a2a2a;
    background: #212121;
    gap: 12px;
  }

  .model-badge {
    font-size: 13px;
    color: #8e8ea0;
    background: #2a2a2a;
    padding: 4px 10px;
    border-radius: 6px;
  }

  /* CHAT AREA */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px 0;
    scroll-behavior: smooth;
  }

  .chat-area::-webkit-scrollbar { width: 6px; }
  .chat-area::-webkit-scrollbar-track { background: transparent; }
  .chat-area::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }

  .message-row {
    max-width: 720px;
    margin: 0 auto;
    padding: 6px 24px;
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .message-row.user {
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg-avatar.glitch { background: #7F77DD; color: #fff; }
  .msg-avatar.user-av { background: #3a3a3a; color: #ececec; }

  .msg-content {
    flex: 1;
    font-size: 15px;
    line-height: 1.7;
    color: #ececec;
    max-width: 600px;
  }

  .message-row.user .msg-content {
    background: #2f2f2f;
    padding: 10px 16px;
    border-radius: 16px;
    border-bottom-right-radius: 4px;
  }

  .msg-name {
    font-size: 12px;
    font-weight: 600;
    color: #8e8ea0;
    margin-bottom: 4px;
  }

  .message-row.user .msg-name { text-align: right; }

  .cursor {
    display: inline-block;
    width: 2px;
    height: 16px;
    background: #ececec;
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* EMPTY STATE */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: #8e8ea0;
  }

  .empty-state .big-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: #7F77DD;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }

  .empty-state h2 {
    font-size: 22px;
    font-weight: 600;
    color: #ececec;
  }

  .empty-state p {
    font-size: 14px;
    color: #8e8ea0;
  }

  /* INPUT AREA */
  .input-area {
    padding: 12px 24px 20px;
    background: #212121;
  }

  .input-wrapper {
    max-width: 720px;
    margin: 0 auto;
    background: #2f2f2f;
    border-radius: 16px;
    border: 1px solid #3a3a3a;
    display: flex;
    align-items: flex-end;
    padding: 12px 14px;
    gap: 10px;
    transition: border-color 0.15s;
  }

  .input-wrapper:focus-within {
    border-color: #7F77DD;
  }

  .input-wrapper textarea {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: #ececec;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    max-height: 200px;
    line-height: 1.6;
    overflow-y: auto;
  }

  .input-wrapper textarea::placeholder { color: #6b6b6b; }

  .send-btn {
    width: 34px;
    height: 34px;
    background: #7F77DD;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, opacity 0.15s;
  }

  .send-btn:hover { background: #6b63c9; }
  .send-btn:disabled { background: #3a3a3a; cursor: not-allowed; opacity: 0.5; }

  .send-btn svg {
    width: 16px; height: 16px;
    stroke: #fff;
    fill: none;
  }

  .footer-note {
    text-align: center;
    font-size: 12px;
    color: #6b6b6b;
    margin-top: 10px;
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
  }

  /* MOBILE */
  @media (max-width: 640px) {
    .sidebar { display: none; }
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-top">
    <div class="avatar">N</div>
    <span class="sidebar-name">Glitch</span>
  </div>

  <button class="new-chat-btn" onclick="newChat()">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
    New chat
  </button>

  <div class="sidebar-section">Recent</div>
  <div id="history-list"></div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <span class="model-badge">Glitch · llama-3.1-8b</span>
  </div>

  <div class="chat-area" id="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="big-avatar">N</div>
      <h2>Hey, I'm Glitch.</h2>
      <p>What's on your mind?</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="user-input"
        placeholder="Message Glitch..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
    <div class="footer-note">Glitch can make mistakes. Use your judgment.</div>
  </div>
</div>

<script>
  let history = [];
  let thinking = false;
  let chatTitles = [];

  const chatArea = document.getElementById("chat-area");
  const emptyState = document.getElementById("empty-state");
  const userInput = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 200) + "px";
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function scrollBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function addMessage(role, text) {
    if (emptyState.parentNode) emptyState.remove();

    const isUser = role === "user";
    const row = document.createElement("div");
    row.className = "message-row" + (isUser ? " user" : "");

    const av = document.createElement("div");
    av.className = "msg-avatar " + (isUser ? "user-av" : "glitch");
    av.textContent = isUser ? "K" : "N";

    const content = document.createElement("div");
    content.className = "msg-content";

    const name = document.createElement("div");
    name.className = "msg-name";
    name.textContent = isUser ? "You" : "Glitch";

    const body = document.createElement("div");
    body.className = "msg-body";
    body.textContent = text;

    content.appendChild(name);
    content.appendChild(body);
    row.appendChild(av);
    row.appendChild(content);
    chatArea.appendChild(row);
    scrollBottom();
    return body;
  }

  async function sendMessage() {
    if (thinking) return;
    const text = userInput.value.trim();
    if (!text) return;

    userInput.value = "";
    userInput.style.height = "auto";
    sendBtn.disabled = true;
    thinking = true;

    addMessage("user", text);
    history.push({ role: "user", content: text });

    if (history.length === 1) {
      const short = text.length > 30 ? text.slice(0, 30) + "…" : text;
      chatTitles.push(short);
      updateSidebar();
    }

    const glitchBody = addMessage("assistant", "");
    const cursor = document.createElement("span");
    cursor.className = "cursor";
    glitchBody.appendChild(cursor);

    let reply = "";

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ history })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value, { stream: true });
        reply += chunk;
        glitchBody.textContent = reply;
        glitchBody.appendChild(cursor);
        scrollBottom();
      }
    } catch (e) {
      reply = "(Something went wrong — try again)";
      glitchBody.textContent = reply;
    }

    cursor.remove();
    history.push({ role: "assistant", content: reply });

    if (history.length > 40) history = history.slice(-40);

    thinking = false;
    sendBtn.disabled = false;
    userInput.focus();
  }

  function newChat() {
    history = [];
    chatArea.innerHTML = "";
    const es = document.createElement("div");
    es.className = "empty-state";
    es.id = "empty-state";
    es.innerHTML = `
      <div class="big-avatar">N</div>
      <h2>Hey, I'm Glitch.</h2>
      <p>What's on your mind?</p>
    `;
    chatArea.appendChild(es);
    userInput.focus();
  }

  function updateSidebar() {
    const list = document.getElementById("history-list");
    list.innerHTML = "";
    [...chatTitles].reverse().forEach(title => {
      const item = document.createElement("div");
      item.className = "history-item";
      item.textContent = title;
      list.appendChild(item);
    });
  }
</script>
</body>
</html>
